<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ieradušies absolventi</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: #fff;
  background-image:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.75)),
    url("https://talsupsk.lv/wp-content/uploads/2026/01/talsu-pamatskola-1170x878.jpg");
  background-size: cover;
  background-position: center;
}

/* ===== PULKSTENIS ===== */
#clockBox {
  position: fixed;
  top: 2vh;
  right: 2vw;
  background: rgba(0,0,0,0.65);
  padding: 1vh 1.5vw;
  border-radius: 10px;
}
#clockTime {
  color:#ffd700;
  font-size: clamp(28px, 2.8vw, 50px);
}
#clockDate {
  font-size: clamp(14px, 1vw, 22px);
}

/* ===== POPUP ===== */
#popup {
  position: fixed;
  top: 4vh;
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: rgba(0,0,0,0.9);
  border: 2px solid #ffd700;
  padding: 1.5vh 2vw;
  border-radius: 10px;
  font-weight: bold;
  font-size: clamp(18px, 1.8vw, 32px);
  opacity: 0;
  transition: all 0.4s ease;
}
#popup.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ===== LAYOUT ===== */
.main {
  padding-top: 10vh;
  padding-bottom: 16vh;
  text-align: center;
}

h1 {
  font-size: clamp(34px, 4vw, 70px);
  margin-bottom: 3vh;
  text-shadow: 0 3px 15px rgba(0,0,0,0.7);
}

/* ===== TABULA ===== */
table {
  margin: auto;
  width: 70%;
  max-width: 1200px;
  font-size: clamp(22px, 2.2vw, 40px);
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(6px);
  border-collapse: collapse;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

th, td {
  padding: 1.2vh;
  border-bottom: 1px solid rgba(255,255,255,0.2);
}
th {
  color:#ffd700;
}

/* ===== FOOTER ===== */
.footer {
  margin-top: 1.5vh;
  font-size: clamp(14px, 1.2vw, 22px);
  color: #ccc;
}

/* ===== TIMELINE ===== */
#timeline {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: rgba(0,0,0,0.85);
  padding: 1.5vh;
  text-align: center;
  color: #ffd700;
  font-size: clamp(16px, 1.4vw, 28px);
}
</style>
</head>

<body>

<div id="clockBox">
  <div id="clockTime"></div>
  <div id="clockDate"></div>
</div>

<div id="popup"></div>

<div class="main">
  <h1>Ieradušies absolventi</h1>

  <table>
    <thead>
      <tr>
        <th>Vārds</th>
        <th>Uzvārds</th>
        <th>Izlaiduma gads</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <div class="footer" id="pageInfo"></div>
</div>

<div id="timeline">
  <span id="timelineText"></span>
</div>

<script>
// ===== PULKSTENIS =====
function updateClock(){
  const now=new Date();
  clockTime.textContent =
    now.toLocaleTimeString("lv-LV",{hour:"2-digit",minute:"2-digit"});
  clockDate.textContent =
    now.toLocaleDateString("lv-LV",{day:"numeric",month:"long"});
}
setInterval(updateClock,1000);
updateClock();

// ===== CSV =====
const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vR4zOLpFlQgPZ4Lf9cKgWbMCxe8ZZtg2oc9QtE--1FpYK-YiaqBjaQY174sXey8b91m02OlRu-bD1Ax/pub?output=csv";

const ROWS_PER_PAGE=5;
let rows=[],page=0;
let lastCount=0;
let nextDelay=9000;

// ===== LOAD DATA
async function loadData(){
  const text=await (await fetch(CSV_URL)).text();
  const d=text.includes(";")?";":",";
  const lines=text.trim().split("\n");

  const newRows = lines.slice(1)
    .map(r=>r.split(d))
    .filter(r=>r.length>=3)
    .map(r=>({
      vards:r[0],
      uzvards:r[1],
      gads:Number(r[2])
    }))
    .sort((a,b)=>a.gads-b.gads);

  if (newRows.length > lastCount) {
    const last = newRows[newRows.length - 1];
    showPopup(`${last.vards} ${last.uzvards} (${last.gads})`);
  }

  lastCount = newRows.length;
  rows = newRows;

  render();
}

// ===== RENDER
function render(){
  tableBody.innerHTML="";

  rows.slice(page*ROWS_PER_PAGE,(page+1)*ROWS_PER_PAGE)
    .forEach(r=>{
      tableBody.innerHTML+=`
        <tr>
          <td>${r.vards}</td>
          <td>${r.uzvards}</td>
          <td>${r.gads}</td>
        </tr>`;
    });

  const total=Math.max(1,Math.ceil(rows.length/ROWS_PER_PAGE));
  pageInfo.textContent=`Lapa ${page+1} no ${total} • Kopā: ${rows.length}`;

  if (page === total - 1) {
    page = 0;
    nextDelay = 16000;
  } else {
    page++;
    nextDelay = 9000;
  }
}

// ===== LOOP
function loopRender(){
  render();
  setTimeout(loopRender, nextDelay);
}

// ===== POPUP
function showPopup(name){
  popup.textContent="Jauns ieraksts – " + name;
  popup.classList.add("show");

  setTimeout(()=>{
    popup.classList.remove("show");
  },2000);
}

// START
loadData();
setInterval(loadData,3000);
loopRender();

// ===== TIMELINE
const timeline=[
 "1919 – Dibināta Talsu pamatskola",
 "1924 – Pirmie absolventi",
 "1960–1980 – Skolas attīstība",
 "2022 – Skolas pārbūve",
 "2024 – Atjaunota skola",
 "2026 – Salidojums"
];

let i=0;
setInterval(()=>{
  timelineText.textContent=timeline[i];
  i=(i+1)%timeline.length;
},5000);
</script>

</body>
</html>
``
