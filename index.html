<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<title>Ieradušies absolventi</title>

<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  color: #fff;
  background-image:
    linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
    url("https://talsupsk.lv/wp-content/uploads/2023/09/Talsu-pamatskola-1024x683.jpg");
  background-size: cover;
  background-position: center;
}

/* PULKSTENIS */
#clockBox {
  position: fixed;
  top: 20px;
  right: 20px;
  background: rgba(0,0,0,0.65);
  padding: 14px 18px;
  border-radius: 12px;
  text-align: center;
}
#clockTime {
  font-size: 34px;
  font-weight: bold;
  color: #ffd700;
}
#clockDate {
  font-size: 16px;
}

/* VIRSRaksts */
h1 {
  text-align: center;
  font-size: 46px;
  margin: 25px 0 15px;
}

/* TABULA – atbrīvota vieta lodziņam */
table {
  width: calc(100% - 340px);
  margin-left: 20px;
  border-collapse: collapse;
  font-size: 28px;
  background: rgba(0,0,0,0.55);
  border-radius: 12px;
}
th, td {
  padding: 12px;
  border-bottom: 1px solid #555;
}
th {
  color: #ffd700;
  text-align: left;
}

/* FOOTER */
.footer {
  text-align: center;
  margin: 12px 0;
  font-size: 20px;
}

/* TIMELINE */
#timeline {
  width: 100%;
  text-align: center;
  padding: 14px 10px;
  font-size: 24px;
  color: #ffd700;
  background: rgba(0,0,0,0.65);
}
#timelineText {
  transition: opacity 1.5s ease-in-out;
}

/* PĀRBŪVES LODZIŅŠ */
#rebuildBox {
  position: fixed;
  right: 20px;
  bottom: 80px;
  width: 300px;
  background: rgba(0,0,0,0.8);
  border-radius: 12px;
  padding: 12px;
  font-size: 16px;
  line-height: 1.4;
}
#rebuildTitle {
  font-size: 18px;
  font-weight: bold;
  color: #ffd700;
  text-align: center;
  margin-bottom: 8px;
}
#rebuildContent {
  transition: opacity 1.2s ease-in-out;
}
#rebuildContent img,
#rebuildContent iframe {
  width: 100%;
  border-radius: 8px;
}
#rebuildContent iframe {
  height: 160px;
  border: none;
}
</style>
</head>

<body>

<!-- PULKSTENIS -->
<div id="clockBox">
  <div id="clockTime"></div>
  <div id="clockDate"></div>
</div>

<h1>Ieradušies absolventi</h1>

<table>
<thead>
<tr>
  <th>Vārds</th>
  <th>Uzvārds</th>
  <th>Izlaiduma gads</th>
  <th>Klase</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<div class="footer" id="pageInfo"></div>

<div id="timeline">
  <span id="timelineText"></span>
</div>

<!-- PĀRBŪVES STĀSTS -->
<div id="rebuildBox">
  <div id="rebuildTitle">Skolas pārbūves stāsts</div>
  <div id="rebuildContent"></div>
</div>

<script>
// ========= PULKSTENIS =========
function updateClock() {
  const now = new Date();
  clockTime.innerText = now.toLocaleTimeString("lv-LV",{hour:"2-digit",minute:"2-digit"});
  clockDate.innerText = now.toLocaleDateString("lv-LV",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
}
setInterval(updateClock,1000); updateClock();

// ========= CSV =========
const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vR4zOLpFlQgPZ4Lf9cKgWbMCxe8ZZtg2oc9QtE--1FpYK-YiaqBjaQY174sXey8b91m02OlRu-bD1Ax/pub?output=csv";
let rows=[],page=0,ROWS_PER_PAGE=15;

async function loadData(){
  const t=await (await fetch(CSV_URL)).text();
  const d=t.includes(";")?";":",";
  rows=t.trim().split("\n").slice(1).map(r=>r.split(d)).filter(r=>r[0]);
  renderTable();
}
function renderTable(){
  tableBody.innerHTML="";
  rows.slice(page*ROWS_PER_PAGE,(page+1)*ROWS_PER_PAGE)
   .forEach(r=>tableBody.innerHTML+=`<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td></tr>`);
  page=(page+1)%Math.ceil(rows.length/ROWS_PER_PAGE);
}
setInterval(loadData,30000);
setInterval(renderTable,7000);
loadData();

// ========= TIMELINE =========
const timeline=[
 "1919 – Dibināta Talsu pamatskola",
 "1924–1925 – Pirmie absolventi",
 "1940–1950 – Vecākās paaudzes",
 "2022 – Sākta skolas pārbūve",
 "2024 – Atgriešanās atjaunotā skolā",
 "2026 – Absolventu salidojums"
];
let ti=0;
setInterval(()=>{
  timelineText.style.opacity=0;
  setTimeout(()=>{ timelineText.innerText=timeline[ti]; timelineText.style.opacity=1; ti=(ti+1)%timeline.length; },500);
},6000);

// ========= PĀRBŪVES SATURS =========
const rebuildItems=[
 {type:"text",value:"2022. gada otrajā pusē sākās ilgi gaidītā Talsu pamatskolas pārbūve."},
 {type:"image",value:"https://www.talsunovads.lv/sites/talsi/files/styles/gallery/public/2024-05/talsu_pamatskola_parbuve_1.jpg"},
 {type:"image",value:"https://www.talsunovads.lv/sites/talsi/files/styles/gallery/public/2024-05/talsu_pamatskola_parbuve_2.jpg"},
 {type:"video",value:"<iframe src='https://www.youtube.com/embed/l3q5MEZM6TI?controls=0&mute=1' allowfullscreen gadā skolēni atgriezās atjaunotā, drošā un mūsdienīgā skolā."}
];
let ri=0;
setInterval(()=>{
  rebuildContent.style.opacity=0;
  setTimeout(()=>{
    rebuildContent.innerHTML =
      rebuildItems[ri].type==="text"
        ? rebuildItems[ri].value
        : rebuildItems[ri].value;
    rebuildContent.style.opacity=1;
    ri=(ri+1)%rebuildItems.length;
  },600);
},8000);
</script>

</body>
</html>
