<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<title>Ieradušies absolventi</title>

<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  color: #fff;

  /* FONA BILDE + TUMŠS PĀRKLĀJUMS */
  background-image:
    linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
    url("https://talsupsk.lv/wp-content/uploads/2026/01/talsu-pamatskola-1170x878.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* PULKSTENIS */
#clockBox {
  position: fixed;
  top: 20px;
  right: 20px;
  background: rgba(0, 0, 0, 0.65);
  padding: 14px 18px;
  border-radius: 12px;
  text-align: center;
  box-shadow: 0 0 12px rgba(0,0,0,0.6);
}
#clockTime {
  font-size: 36px;
  font-weight: bold;
  color: #ffd700;
}
#clockDate {
  font-size: 18px;
  margin-top: 4px;
}

h1 {
  text-align: center;
  font-size: 48px;
  margin: 30px 0 20px;
}

table {
  width: 92%;
  margin: auto;
  border-collapse: collapse;
  font-size: 30px;
  background: rgba(0,0,0,0.55);
  border-radius: 12px;
}

th, td {
  padding: 14px;
  border-bottom: 1px solid #555;
}

th {
  color: #ffd700;
  text-align: left;
}

.footer {
  text-align: center;
  margin: 14px 0 10px;
  font-size: 22px;
  color: #ddd;
}

/* TIMELINE JOSLA */
#timeline {
  width: 100%;
  text-align: center;
  padding: 16px 10px;
  font-size: 26px;
  color: #ffd700;
  background: rgba(0,0,0,0.65);
  letter-spacing: 1px;
}
</style>
</head>

<body>

<!-- PULKSTENIS -->
<div id="clockBox">
  <div id="clockTime"></div>
  <div id="clockDate"></div>
</div>
