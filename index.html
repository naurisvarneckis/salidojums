<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<title>Ieradušies absolventi</title>

<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  color: #fff;
  min-height: 100vh;

  background-image:
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
    url("https://talsupsk.lv/wp-content/uploads/2026/01/talsu-pamatskola-1170x878.jpg");
  background-size: cover;
  background-position: center;
}

/* ======= PULKSTENIS ======= */
#clockBox {
  position: fixed;
  top: 20px;
  right: 20px;
  background: rgba(0,0,0,0.65);
  padding: 14px 18px;
  border-radius: 12px;
  text-align: center;
  z-index: 10;
}
#clockTime {
  font-size: 34px;
  font-weight: bold;
  color: #ffd700;
}
#clockDate {
  font-size: 16px;
}

/* ======= LAYOUT ======= */
.main {
  min-height: calc(100vh - 90px);
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* ======= VIRSRaksts ======= */
h1 {
  text-align: center;
  font-size: 48px;
  margin-bottom: 25px;
}

/* ======= TABULA (TĪRI CENTRĒTA) ======= */
.table-wrap {
  display: flex;
  justify-content: center;
}

table {
  width: 900px;            /* 👈 tieši 3 kolonnām */
  max-width: 90%;
  border-collapse: collapse;
  font-size: 32px;
  background: rgba(0,0,0,0.55);
  border-radius: 14px;
  overflow: hidden;
}

th, td {
  padding: 16px 24px;
  border-bottom: 1px solid rgba(255,255,255,0.15);
}

th {
  color: #ffd700;
  text-align: left;
}

/* ======= FOOTER ======= */
.footer {
  text-align: center;
  margin-top: 14px;
  font-size: 22px;
  color: #ddd;
}

/* ======= TIMELINE ======= */
#timeline {
  width: 100%;
  margin-top: 24px;
  padding: 16px 10px;
  text-align: center;
  font-size: 24px;
  color: #ffd700;
  background: rgba(0,0,0,0.65);
}
</style>
</head>

<body>

<!-- PULKSTENIS -->
<div id="clockBox">
  <div id="clockTime"></div>
  <div id="clockDate"></div>
</div>

<div class="main">

  <h1>Ieradušies absolventi</h1>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Vārds</th>
          <th>Uzvārds</th>
          <th>Izlaiduma gads</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <div class="footer" id="pageInfo"></div>

</div>

<!-- TIMELINE -->
<div id="timeline">
  <span id="timelineText"></span>
</div>

<script>
/* ======= PULKSTENIS ======= */
function updateClock() {
  const now = new Date();
  clockTime.textContent =
    now.toLocaleTimeString("lv-LV", { hour: "2-digit", minute: "2-digit" });
  clockDate.textContent =
    now.toLocaleDateString("lv-LV", {
      weekday: "long",
      day: "numeric",
      month: "long",
      year: "numeric"
    });
}
updateClock();
setInterval(updateClock, 1000);

/* ======= CSV ======= */
const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vR4zOLpFlQgPZ4Lf9cKgWbMCxe8ZZtg2oc9QtE--1FpYK-YiaqBjaQY174sXey8b91m02OlRu-bD1Ax/pub?output=csv";

const ROWS_PER_PAGE = 10;
let rows = [];
let page = 0;

async function loadData() {
  const text = await (await fetch(CSV_URL)).text();
  const d = text.includes(";") ? ";" : ",";
  const lines = text.trim().split("\n");

  rows = lines.slice(1)
    .map(r => r.split(d))
    .filter(r => r[0])
    .map(r => ({
      vards: r[0],
      uzvards: r[1],
      gads: r[2]
    }));

  page = 0;
  render();
}

function render() {
  tableBody.innerHTML = "";

  rows
    .slice(page * ROWS_PER_PAGE, (page + 1) * ROWS_PER_PAGE)
    .forEach(r => {
      tableBody.innerHTML += `
        <tr>
          <td>${r.vards}</td>
          <td>${r.uzvards}</td>
          <td>${r.gads}</td>
        </tr>`;
    });

  const totalPages = Math.max(1, Math.ceil(rows.length / ROWS_PER_PAGE));
  pageInfo.textContent =
    `Lapa ${page + 1} no ${totalPages} • Kopā ieradušies: ${rows.length}`;

  page = (page + 1) % totalPages;
}

loadData();
setInterval(loadData, 30000);
setInterval(render, 7000);

/* ======= TIMELINE ======= */
const timeline = [
  "1919 – Dibināta Talsu pamatskola",
  "1924–1925 – Pirmie absolventu izlaidumi",
  "1940–1950 – Vecāko absolventu paaudze",
  "1960–1980 – Skolas izaugsmes gadi",
  "1990–2000 – Pārmaiņu laiks",
  "2022 – Sākās skolas pārbūve",
  "2024 – Atjaunota mūsdienīga skola",
  "2026 – Absolventu salidojums"
];
let ti = 0;

function rotateTimeline() {
  timelineText.textContent = timeline[ti];
  ti = (ti + 1) % timeline.length;
}
rotateTimeline();
setInterval(rotateTimeline, 6000);
</script>

</body>
</html>
