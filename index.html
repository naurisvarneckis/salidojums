<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<title>Ieradušies absolventi</title>

<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  color: #fff;
  background-image:
    linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
    url("https://talsupsk.lv/wp-content/uploads/2026/01/talsu-pamatskola-1170x878.jpg");
  background-size: cover;
  background-position: center;
}

h1 {
  text-align: center;
  font-size: 48px;
  margin: 30px 0 20px;
}

table {
  width: 92%;
  margin: auto;
  border-collapse: collapse;
  font-size: 30px;
  background: rgba(0,0,0,0.55);
  border-radius: 12px;
}
th, td {
  padding: 14px;
  border-bottom: 1px solid #555;
}
th {
  color: #ffd700;
  text-align: left;
}

.footer {
  text-align: center;
  margin: 14px 0 10px;
  font-size: 22px;
}

/* TIMELINE */
#timeline {
  width: 100%;
  text-align: center;
  padding: 16px 10px;
  font-size: 26px;
  color: #ffd700;
  background: rgba(0,0,0,0.65);
}
#timelineText {
  transition: opacity 1.6s ease-in-out;
}

/* PĀRBŪVES LODZIŅŠ */
#rebuildBox {
  position: fixed;
  right: 20px;
  bottom: 90px;
  width: 360px;
  background: rgba(0, 0, 0, 0.75);
  border-radius: 12px;
  padding: 16px 18px;
  font-size: 20px;
  line-height: 1.45;
  box-shadow: 0 0 15px rgba(0,0,0,0.6);
}
#rebuildTitle {
  font-size: 22px;
  font-weight: bold;
  color: #ffd700;
  margin-bottom: 10px;
  text-align: center;
}
#rebuildText {
  transition: opacity 1.5s ease-in-out;
}
</style>
</head>

<body>

<h1>Ieradušies absolventi</h1>

<table>
<thead>
<tr>
  <th>Vārds</th>
  <th>Uzvārds</th>
  <th>Izlaiduma gads</th>
  <th>Klase</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<div class="footer" id="pageInfo"></div>

<div id="timeline">
  <span id="timelineText"></span>
</div>

<div id="rebuildBox">
  <div id="rebuildTitle">Skolas pārbūves stāsts</div>
  <div id="rebuildText"></div>
</div>

<script>
// ===============================
// GOOGLE SHEETS CSV
// ===============================
const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vR4zOLpFlQgPZ4Lf9cKgWbMCxe8ZZtg2oc9QtE--1FpYK-YiaqBjaQY174sXey8b91m02OlRu-bD1Ax/pub?output=csv";

const ROWS_PER_PAGE = 20;
const PAGE_TIME = 7000;
let rows = [];
let page = 0;

async function loadData() {
  const res = await fetch(CSV_URL);
  const text = await res.text();
  const delimiter = text.includes(";") ? ";" : ",";
  const lines = text.trim().split("\n");
  const headers = lines[0].split(delimiter).map(h => h.toLowerCase().trim());

  const idxVards = headers.indexOf("vārds");
  const idxUzvards = headers.indexOf("uzvārds");
  const idxGads = headers.findIndex(h => h.includes("izlaid"));
  const idxKlase = headers.findIndex(h => h.includes("klas"));

  rows = [];
  lines.slice(1).forEach(line => {
    const c = line.split(delimiter);
    if (!c[idxVards]) return;
    rows.push({
      vards: c[idxVards],
      uzvards: c[idxUzvards],
      gads: c[idxGads],
      klase: idxKlase >= 0 ? c[idxKlase] : ""
    });
  });

  page = 0;
  renderTable();
}

function renderTable() {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";
  const start = page * ROWS_PER_PAGE;
  const slice = rows.slice(start, start + ROWS_PER_PAGE);
  slice.forEach(r => {
    tbody.innerHTML += `
      <tr>
        <td>${r.vards}</td>
        <td>${r.uzvards}</td>
        <td>${r.gads}</td>
        <td>${r.klase}</td>
      </tr>`;
  });

  const totalPages = Math.max(1, Math.ceil(rows.length / ROWS_PER_PAGE));
  document.getElementById("pageInfo").innerText =
    `Lapa ${page + 1} no ${totalPages} • Kopā ieradušies: ${rows.length}`;

  page = (page + 1) % totalPages;
}

// ===============================
// TIMELINE
// ===============================
const timelineItems = [
  { text: "1919 – Dibināta Talsu pamatskola", highlight: false },
  { text: "1924–1925 – Pirmie absolventu izlaidumi", highlight: false },
  { text: "1940–1950 – Vecāko absolventu paaudze", highlight: false },
  { text: "1960–1980 – Skolas izaugsmes gadi", highlight: false },
  { text: "1990–2000 – Pārmaiņu laiks", highlight: false },
  { text: "2010–2020 – Mūsdienīga skola jaunām paaudzēm", highlight: false },
  { text: "2022 – Sākās ilgi gaidītā Talsu pamatskolas pārbūve", highlight: true },
  { text: "2024 – Skola durvis vēra atjaunotā vidē", highlight: false },
  { text: "2026 – Absolventu salidojums, kas vieno paaudzes", highlight: false }
];

let timelineIndex = 0;
function rotateTimeline() {
  const el = document.getElementById("timelineText");
  const item = timelineItems[timelineIndex];
  el.style.opacity = 0;
  setTimeout(() => {
    el.innerText = item.text;
    el.style.opacity = 1;
    el.style.transition = item.highlight
      ? "opacity 2.2s ease-in-out"
      : "opacity 0.7s ease-in-out";
  }, 600);
  timelineIndex = (timelineIndex + 1) % timelineItems.length;
}

// ===============================
// PĀRBŪVES STĀSTS (FAKTI)
// ===============================
const rebuildStory = [
  "2022. gada otrajā pusē sākās ilgi gaidītā Talsu pamatskolas pārbūve.",
  "Pārbūvētas un paplašinātas skolas telpas, izbūvētas jaunas klases virs zāles.",
  "Modernizēta ventilācija, apkure, ūdensapgāde un drošības sistēmas.",
  "Ieviesti vides pieejamības un universālā dizaina risinājumi.",
  "Pārbūves laikā mācības notika citās telpās Talsos un Vandzenē.",
  "2024. gadā skolēni atgriezās atjaunotā un mūsdienīgā skolā.",
  "Tradīcijas saglabājot – nākotni veidojot."
];

let rebuildIndex = 0;
function rotateRebuildText() {
  const el = document.getElementById("rebuildText");
  el.style.opacity = 0;
  setTimeout(() => {
    el.innerText = rebuildStory[rebuildIndex];
    el.style.opacity = 1;
    rebuildIndex = (rebuildIndex + 1) % rebuildStory.length;
  }, 1200);
}

// START
loadData();
rotateTimeline();
rotateRebuildText();

setInterval(renderTable, PAGE_TIME);
setInterval(loadData, 30000);
setInterval(rotateTimeline, 6000);
setInterval(rotateRebuildText, 7000);
</script>

</body>
</html>
