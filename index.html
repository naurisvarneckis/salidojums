<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<title>Ieradušies absolventi</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: #fff;
  background-image:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.75)),
    url("https://talsupsk.lv/wp-content/uploads/2026/01/talsu-pamatskola-1170x878.jpg");
  background-size: cover;
}

/* ===== PULKSTENIS ===== */
#clockBox {
  position: fixed;
  top: 15px;
  right: 20px;
  background: rgba(0,0,0,0.6);
  padding: 10px 16px;
  border-radius: 10px;
}
#clockTime { font-size: 28px; color:#ffd700; }
#clockDate { font-size: 14px; }

/* ===== POPUP ===== */
#popup {
  position: fixed;
  top: 90px;
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: rgba(0,0,0,0.9);
  border: 2px solid #ffd700;
  padding: 16px 28px;
  border-radius: 10px;
  font-size: 22px;
  font-weight: bold;
  opacity: 0;
  transition: all 0.5s ease;
}
#popup.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ===== LAYOUT ===== */
.main {
  padding-top: 110px;
  text-align: center;
}

h1 {
  font-size: 40px;
  margin-bottom: 30px;
}

/* ===== TABULA ===== */
table {
  margin: auto;
  width: 650px;
  font-size: 28px;
  background: rgba(0,0,0,0.5);
  border-collapse: collapse;
  border-radius: 10px;
}

th, td {
  padding: 14px;
  border-bottom: 1px solid rgba(255,255,255,0.2);
}

th {
  color:#ffd700;
}

/* ===== FOOTER ===== */
.footer {
  margin-top: 10px;
  color: #ccc;
}

/* ===== TIMELINE ===== */
#timeline {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: rgba(0,0,0,0.8);
  padding: 12px;
  text-align: center;
  color: #ffd700;
}
</style>
</head>

<body>

<div id="clockBox">
  <div id="clockTime"></div>
  <div id="clockDate"></div>
</div>

<!-- ✅ Popup -->
<div id="popup"></div>

<div class="main">
  <h1>Ieradušies absolventi</h1>

  <table>
    <thead>
      <tr>
        <th>Vārds</th>
        <th>Uzvārds</th>
        <th>Izlaiduma gads</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <div class="footer" id="pageInfo"></div>
</div>

<div id="timeline">
  <span id="timelineText"></span>
</div>

<script>
// ===== PULKSTENIS =====
function updateClock(){
  const now=new Date();
  clockTime.textContent = now.toLocaleTimeString("lv-LV",{hour:"2-digit",minute:"2-digit"});
  clockDate.textContent = now.toLocaleDateString("lv-LV",{day:"numeric",month:"long"});
}
setInterval(updateClock,1000);
updateClock();

// ===== CSV =====
const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vR4zOLpFlQgPZ4Lf9cKgWbMCxe8ZZtg2oc9QtE--1FpYK-YiaqBjaQY174sXey8b91m02OlRu-bD1Ax/pub?output=csv";

const ROWS_PER_PAGE=5;
let rows=[],page=0;
let lastCount=0;

async function loadData(){
  const text=await (await fetch(CSV_URL)).text();
  const d=text.includes(";")?";":",";
  const lines=text.trim().split("\n");

  const newRows = lines.slice(1)
    .map(r=>r.split(d))
    .filter(r=>r.length>=3)
    .map(r=>({
      vards:r[0],
      uzvards:r[1],
      gads:r[2]
    }));

  // ✅ JAUNS IERAKSTS → POPUP
  if (newRows.length > lastCount) {
    const last = newRows[newRows.length - 1];
    showPopup(`${last.vards} ${last.uzvards} (${last.gads})`);
  }

  lastCount = newRows.length;
  rows = newRows;

  render();
}

function render(){
  tableBody.innerHTML="";

  rows.slice(page*ROWS_PER_PAGE,(page+1)*ROWS_PER_PAGE)
    .forEach(r=>{
      tableBody.innerHTML+=`
        <tr>
          <td>${r.vards}</td>
          <td>${r.uzvards}</td>
          <td>${r.gads}</td>
        </tr>`;
    });

  const total=Math.max(1,Math.ceil(rows.length/ROWS_PER_PAGE));
  pageInfo.textContent=`Lapa ${page+1} no ${total} • Kopā: ${rows.length}`;

  page=(page+1)%total;
}

// ===== POPUP =====
function showPopup(name){
  const popup=document.getElementById("popup");

  popup.textContent = "Jauns ieraksts – " + name;

  popup.classList.add("show");

  setTimeout(()=>{
    popup.classList.remove("show");
  },2000);
}

// START
loadData();
setInterval(loadData,3000);
setInterval(render,6000);

// ===== TIMELINE =====
const timeline=[
 "1919 – Dibināta Talsu pamatskola",
 "1924 – Pirmie absolventi",
 "2022 – Skolas pārbūve",
 "2024 – Atjaunota skola",
 "2026 – Salidojums"
];

let i=0;
setInterval(()=>{
  timelineText.textContent=timeline[i];
  i=(i+1)%timeline.length;
},5000);
</script>

</body>
</html>
