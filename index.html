<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<title>Ieradušies absolventi</title>

<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  color: #fff;

  /* FONA BILDE + TUMŠS PĀRKLĀJUMS */
  background-image:
    linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
    url("https://talsupsk.lv/wp-content/uploads/2026/01/talsu-pamatskola-1170x878.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

h1 {
  text-align: center;
  font-size: 48px;
  margin: 30px 0 20px;
}

table {
  width: 92%;
  margin: auto;
  border-collapse: collapse;
  font-size: 30px;
  background: rgba(0,0,0,0.55);
  border-radius: 12px;
}

th, td {
  padding: 14px;
  border-bottom: 1px solid #555;
}

th {
  color: #ffd700;
  text-align: left;
}

.footer {
  text-align: center;
  margin: 14px 0 10px;
  font-size: 22px;
  color: #ddd;
}

/* TIMELINE JOSLA */
#timeline {
  width: 100%;
  text-align: center;
  padding: 16px 10px;
  font-size: 26px;
  color: #ffd700;
  background: rgba(0,0,0,0.65);
  letter-spacing: 1px;
}
</style>
</head>

<body>

<h1>Ieradušies absolventi</h1>

<table>
<thead>
<tr>
  <th>Vārds</th>
  <th>Uzvārds</th>
  <th>Izlaiduma gads</th>
  <th>Klase</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<div class="footer" id="pageInfo"></div>

<!-- TIMELINE -->
<div id="timeline">
  <span id="timelineText"></span>
</div>

<script>
// ===============================
// GOOGLE SHEETS CSV
// ===============================
const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vR4zOLpFlQgPZ4Lf9cKgWbMCxe8ZZtg2oc9QtE--1FpYK-YiaqBjaQY174sXey8b91m02OlRu-bD1Ax/pub?output=csv";

const ROWS_PER_PAGE = 10;
const PAGE_TIME = 7000;

let rows = [];
let page = 0;

async function loadData() {
  const res = await fetch(CSV_URL);
  const text = await res.text();

  const delimiter = text.includes(";") ? ";" : ",";
  const lines = text.trim().split("\n");

  const headers = lines[0].split(delimiter).map(h => h.toLowerCase().trim());

  const idxVards = headers.indexOf("vārds");
  const idxUzvards = headers.indexOf("uzvārds");
  const idxGads = headers.findIndex(h => h.includes("izlaid"));
  const idxKlase = headers.findIndex(h => h.includes("klas"));

  rows = [];

  lines.slice(1).forEach(line => {
    const c = line.split(delimiter);
    if (!c[idxVards]) return;

    rows.push({
      vards: c[idxVards],
      uzvards: c[idxUzvards],
      gads: c[idxGads],
      klase: idxKlase >= 0 ? c[idxKlase] : ""
    });
  });

  page = 0;
  renderTable();
}

function renderTable() {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  const start = page * ROWS_PER_PAGE;
  const slice = rows.slice(start, start + ROWS_PER_PAGE);

  slice.forEach(r => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${r.vards}</td>
      <td>${r.uzvards}</td>
      <td>${r.gads}</td>
      <td>${r.klase}</td>
    `;
    tbody.appendChild(tr);
  });

  const totalPages = Math.max(1, Math.ceil(rows.length / ROWS_PER_PAGE));
  document.getElementById("pageInfo").innerText =
    `Lapa ${page + 1} no ${totalPages} • Kopā ieradušies: ${rows.length}`;

  page = (page + 1) % totalPages;
}

// ===============================
// TIMELINE
// ===============================
const timelineItems = [
  
 "1919 – Dibināta Talsu pamatskola",
 "1924–1925 – Pirmie absolventi",
 "1940–1950 – Vecākās paaudzes",
 "2022 – Sākta skolas pārbūve",
 "2024 – Atgriešanās atjaunotā skolā",
 "2026 – Absolventu salidojums"

];

let timelineIndex = 0;

function rotateTimeline() {
  document.getElementById("timelineText").innerText =
    timelineItems[timelineIndex];
  timelineIndex = (timelineIndex + 1) % timelineItems.length;
}

// START
loadData();
rotateTimeline();

setInterval(renderTable, PAGE_TIME);
setInterval(loadData, 30000);      // dati atjaunojas
setInterval(rotateTimeline, 6000); // timeline mainās
</script>

</body>
</html>
