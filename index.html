<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ieradušies absolventi</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  overflow: hidden;

  background-image:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.75)),
    url("https://talsupsk.lv/wp-content/uploads/2026/01/talsu-pamatskola-1170x878.jpg");

  background-size: cover;
  background-position: center;
}

/* CLOCK */
#clockBox {
  position: fixed;
  top: 2vh;
  right: 2vw;
  background: rgba(0,0,0,0.7);
  padding: 1vh 1.5vw;
  border-radius: 10px;
}
#clockTime { color: gold; font-size: clamp(30px,3vw,50px); }
#clockDate { font-size: clamp(14px,1vw,20px); }

/* POPUP */
#popup {
  position: fixed;
  top: 4vh;
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: rgba(0,0,0,0.9);
  border: 2px solid gold;
  padding: 1vh 2vw;
  border-radius: 10px;
  font-weight: bold;
  font-size: clamp(18px,1.8vw,30px);
  opacity: 0;
  transition: 0.4s;
}
#popup.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* LAYOUT */
.main {
  padding-top: 10vh;
  padding-bottom: 15vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

h1 {
  font-size: clamp(36px,4vw,70px);
  margin-bottom: 2vh;
}

/* TABLE */
.table-wrapper {
  width: 70%;
  max-width: 1200px;
}

/* HEADER (fiksēts) */
table.header {
  width: 100%;
  border-collapse: collapse;
  background: rgba(0,0,0,0.8);
}

table.header th {
  padding: 12px;
  color: gold;
  font-size: clamp(22px,2vw,36px);
}

/* SCROLL AREA */
.scroll-area {
  height: 45vh;
  overflow: hidden;
  position: relative;
}

.scroll-content {
  position: absolute;
  width: 100%;
  animation: scrollUp linear infinite;
}

/* DATA TABLE */
table.data {
  width: 100%;
  border-collapse: collapse;
  font-size: clamp(22px,2vw,34px);
  background: rgba(0,0,0,0.55);
}

table.data td {
  padding: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.2);
}

/* SCROLL */
@keyframes scrollUp {
  0% { transform: translateY(0); }
  100% { transform: translateY(-50%); }
}

/* FADE */
.scroll-area::before,
.scroll-area::after {
  content:"";
  position:absolute;
  left:0;
  width:100%;
  height:60px;
  z-index:5;
}

.scroll-area::before {
  top:0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
}

.scroll-area::after {
  bottom:0;
  background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
}

/* TIMELINE */
#timeline {
  position: fixed;
  bottom: 0;
  width: 100%;
  padding: 1vh;
  background: rgba(0,0,0,0.85);
  text-align: center;
  color: gold;
}
</style>
</head>

<body>

<div id="clockBox">
  <div id="clockTime"></div>
  <div id="clockDate"></div>
</div>

<div id="popup"></div>

<div class="main">
  <h1>Ieradušies absolventi</h1>

  <div class="table-wrapper">

    <!-- ✅ HEADER -->
    <table class="header">
      <thead>
        <tr>
          <th>Vārds</th>
          <th>Uzvārds</th>
          <th>Gads</th>
        </tr>
      </thead>
    </table>

    <!-- ✅ SCROLL -->
    <div class="scroll-area">
      <div class="scroll-content" id="scrollContent">
        <table class="data">
          <tbody id="scrollBody"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<div id="timeline">
  <span id="timelineText"></span>
</div>

<script>
// CLOCK
function updateClock(){
  const n=new Date();
  clockTime.textContent =
    n.toLocaleTimeString("lv-LV",{hour:"2-digit",minute:"2-digit"});
  clockDate.textContent =
    n.toLocaleDateString("lv-LV",{day:"numeric",month:"long"});
}
setInterval(updateClock,1000); updateClock();

// CSV
const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vR4zOLpFlQgPZ4Lf9cKgWbMCxe8ZZtg2oc9QtE--1FpYK-YiaqBjaQY174sXey8b91m02OlRu-bD1Ax/pub?output=csv";

let lastCount=0;

// LOAD
async function load(){
  const txt=await (await fetch(CSV_URL)).text();
  const d=txt.includes(";")?";":",";

  const rows=txt.trim().split("\n")
    .slice(1)
    .map(r=>r.split(d))
    .filter(r=>r.length>=3)
    .map(r=>({ v:r[0], u:r[1], g:Number(r[2]) }))
    .sort((a,b)=>a.g-b.g);

  if(rows.length>lastCount){
    const last=rows[rows.length-1];
    showPopup(`${last.v} ${last.u} (${last.g})`);
  }

  lastCount=rows.length;
  draw(rows);
}

// DRAW
function draw(rows){
  let html="";

  rows.forEach(r=>{
    html+=`
      <tr>
        <td>${r.v}</td>
        <td>${r.u}</td>
        <td>${r.g}</td>
      </tr>`;
  });

  scrollBody.innerHTML = html + html;

  const speed=Math.max(20, rows.length*2);
  scrollContent.style.animationDuration = speed + "s";
}

// POPUP
function showPopup(t){
  popup.textContent="Jauns ieraksts – "+t;
  popup.classList.add("show");
  setTimeout(()=>popup.classList.remove("show"),2000);
}

// TIMELINE
const timeline=[
 "1919 – Dibināta skola",
 "1924 – Pirmie absolventi",
 "2022 – Pārbūve",
 "2024 – Atjaunota skola",
 "2026 – Salidojums"
];

let i=0;
setInterval(()=>{
  timelineText.textContent=timeline[i];
  i=(i+1)%timeline.length;
},5000);

// START
load();
setInterval(load,5000);

</script>

</body>
</html>
