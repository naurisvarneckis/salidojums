<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<title>Ieradušies absolventi</title>

<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  color: #fff;

  background-image:
    linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)),
    url("https://talsupsk.lv/wp-content/uploads/2026/01/talsu-pamatskola-1170x878.jpg");
  background-size: cover;
  background-position: center;
}

/* ===== PULKSTENIS ===== */
#clockBox {
  position: fixed;
  top: 15px;
  right: 20px;
  background: rgba(0,0,0,0.6);
  padding: 10px 16px;
  border-radius: 10px;
}
#clockTime {
  font-size: 28px;
  font-weight: bold;
  color: #ffd700;
}
#clockDate {
  font-size: 14px;
}

/* ===== LAYOUT ===== */
.main {
  padding-top: 80px;
  padding-bottom: 120px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

h1 {
  font-size: 40px;
  margin-bottom: 25px;
}

/* ===== TABULA ===== */
table {
  width: 700px;
  border-collapse: collapse;
  font-size: 28px;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(6px);
  border-radius: 12px;
  overflow: hidden;
  transition: opacity 0.6s ease;
}

.fade {
  opacity: 0;
}

th:nth-child(1), td:nth-child(1) { width: 30%; }
th:nth-child(2), td:nth-child(2) { width: 40%; }
th:nth-child(3), td:nth-child(3) { width: 30%; text-align:center; }

th, td {
  padding: 14px;
  border-bottom: 1px solid rgba(255,255,255,0.15);
}

th {
  color: #ffd700;
  font-size: 24px;
}

/* JAUNĀKAIS IERAKSTS */
.highlight {
  background: rgba(255, 215, 0, 0.18);
  font-weight: bold;
}

/* ===== FOOTER ===== */
.footer {
  margin-top: 10px;
  font-size: 18px;
  color: #ccc;
}

/* ===== TIMELINE ===== */
#timeline {
  position: fixed;
  bottom: 0;
  width: 100%;
  padding: 14px;
  text-align: center;
  font-size: 22px;
  color: #ffd700;
  background: rgba(0,0,0,0.75);
}
</style>
</head>

<body>

<div id="clockBox">
  <div id="clockTime"></div>
  <div id="clockDate"></div>
</div>

<div class="main">

  <h1>Ieradušies absolventi</h1>

  <table id="table">
    <thead>
      <tr>
        <th>Vārds</th>
        <th>Uzvārds</th>
        <th>Izlaiduma gads</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <div class="footer" id="pageInfo"></div>

</div>

<div id="timeline">
  <span id="timelineText"></span>
</div>

<script>
/* ===== PULKSTENIS ===== */
function updateClock() {
  const now = new Date();
  clockTime.textContent =
    now.toLocaleTimeString("lv-LV",{hour:"2-digit",minute:"2-digit"});
}
setInterval(updateClock,1000);
updateClock();

clockDate.textContent =
  new Date().toLocaleDateString("lv-LV",{weekday:"long",day:"numeric",month:"long",year:"numeric"});

/* ===== CSV FAST UPDATE ===== */
const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vR4zOLpFlQgPZ4Lf9cKgWbMCxe8ZZtg2oc9QtE--1FpYK-YiaqBjaQY174sXey8b91m02OlRu-bD1Ax/pub?output=csv";

const ROWS_PER_PAGE=5;

let rows=[],page=0;
let previousData = "";

// 🔥 SMART LOAD
async function loadData(){
  const res = await fetch(CSV_URL);
  const text = await res.text();

  // ✅ JA NAV IZMAIŅU → nedara neko
  if (text === previousData) return;

  previousData = text;

  const d = text.includes(";") ? ";" : ",";
  const lines = text.trim().split("\n");

  rows = lines.slice(1)
    .map(r=>r.split(d))
    .filter(r=>r[0])
    .map(r=>({
      vards:r[0],
      uzvards:r[1],
      gads:Number(r[2])
    }))
    .sort((a,b)=>a.gads-b.gads);

  page = 0;

  render(true); // 🔥 uzreiz pārzīmē
}

// 🔥 RENDER
function render(){
  const table = document.getElementById("table");

  table.classList.add("fade");

  setTimeout(()=>{
    tableBody.innerHTML="";

    rows.slice(page*ROWS_PER_PAGE,(page+1)*ROWS_PER_PAGE)
      .forEach((r,i)=>{
        tableBody.innerHTML+=`
          <tr class="${i===0 ? "highlight" : ""}">
            <td>${r.vards}</td>
            <td>${r.uzvards}</td>
            <td>${r.gads}</td>
          </tr>`;
      });

    const total=Math.max(1,Math.ceil(rows.length/ROWS_PER_PAGE));
